name: agent-box-rt image

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: agent-box-rt-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agent-box-rt

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Update llm-agents lock entry
        id: update-lock
        run: |
          nix flake update llm-agents

          if git diff --quiet -- flake.lock; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update llm-agents"
          git push origin HEAD:main
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Build image archive
        run: |
          nix build --accept-flake-config --impure --print-out-paths --expr 'let flake = builtins.getFlake (toString ./.); in flake.lib.mkAgentBoxImage { system = "x86_64-linux"; }' > image-path.txt
          cp "$(cat image-path.txt)" agent-box.tar.gz
          gunzip --stdout agent-box.tar.gz > agent-box.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          IMAGE_TAG="$(git rev-parse HEAD)"

          nix shell nixpkgs#skopeo -c \
            skopeo copy \
            docker-archive:agent-box.tar \
            docker://${IMAGE_NAME}:${IMAGE_TAG}

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            nix shell nixpkgs#skopeo -c \
              skopeo copy \
              docker-archive:agent-box.tar \
              docker://${IMAGE_NAME}:latest
          fi
