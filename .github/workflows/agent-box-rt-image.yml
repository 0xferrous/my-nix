name: agent-box-rt image

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/agent-box-rt-image.yml"
      - "images/agent-box-rt/**"

permissions:
  contents: read
  packages: write

concurrency:
  group: agent-box-rt-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/agent-box-rt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Build image archive
        run: |
          nix build --accept-flake-config --impure --print-out-paths --expr 'let flake = builtins.getFlake (toString ./.); in flake.lib.mkAgentBoxImage "x86_64-linux" { uid = 1000; gid = 100; uname = "dmnt"; gname = "users"; }' > image-path.txt
          cp "$(cat image-path.txt)" agent-box.tar.gz
          gunzip --stdout agent-box.tar.gz > agent-box.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          nix shell nixpkgs#skopeo -c \
            skopeo copy \
            docker-archive:agent-box.tar \
            docker://${IMAGE_NAME}:${GITHUB_SHA}

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            nix shell nixpkgs#skopeo -c \
              skopeo copy \
              docker-archive:agent-box.tar \
              docker://${IMAGE_NAME}:latest
          fi
